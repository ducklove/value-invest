<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="한국 상장사의 재무 데이터와 시장 지표를 바탕으로 가치투자 관점에서 분석합니다.">
<title>한국 주식 가치투자 분석</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KE611DTCFZ"></script>
<script src="./app-config.js"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
const APP_CONFIG = window.APP_CONFIG || {};
const GA_MEASUREMENT_ID = 'G-KE611DTCFZ';
const GA_STREAM_ID = '13881342022';
const IS_LOCALHOST = ['localhost', '127.0.0.1'].includes(window.location.hostname);

window['ga-disable-' + GA_MEASUREMENT_ID] = IS_LOCALHOST;
gtag('js', new Date());
gtag('config', GA_MEASUREMENT_ID, { anonymize_ip: true });

function trackEvent(name, params = {}) {
  if (IS_LOCALHOST || typeof gtag !== 'function') return;
  gtag('event', name, { stream_id: GA_STREAM_ID, ...params });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="./static/styles.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h3>최근 분석 종목</h3>
    <button class="sidebar-refresh" id="recentRefreshBtn" type="button" onclick="refreshRecentList()">새로고침</button>
  </div>
  <div id="recentList">
    <div style="color:var(--text-secondary);font-size:13px;">아직 분석한 종목이 없습니다.</div>
  </div>
</aside>

<div class="main">
  <div class="header">
    <h1>가치투자 분석</h1>
    <button class="theme-toggle" onclick="toggleTheme()" title="테마 전환">🌓</button>
  </div>
  <div class="search-container">
    <input class="search-input" id="searchInput" placeholder="종목명 또는 종목코드 입력 (예: 삼성전자, 005930)" autocomplete="off">
    <div class="dropdown" id="dropdown"></div>
  </div>

  <div class="company-info" id="companyInfo">
    <div class="header-row">
      <h2 id="companyName"></h2>
      <div class="quote" id="quoteSummary" style="display:none;">
        <span class="quote-price" id="quotePrice"></span>
        <span class="quote-change" id="quoteChange"></span>
        <span class="quote-date" id="quoteDate"></span>
      </div>
    </div>
    <div class="meta" id="companyMeta"></div>
    <div class="coverage" id="coverageNote"></div>
  </div>

  <div id="emptyState" class="empty-state">
    <h2>종목을 검색해 주세요</h2>
    <p>종목코드 또는 회사명으로 검색하면 가치투자 지표를 분석합니다.</p>
  </div>

  <h2 class="section-heading" id="weeklySectionTitle" style="display:none;">주간 밸류에이션</h2>
  <div class="charts-grid" id="weeklyChartsGrid" style="display:none;"></div>

  <h2 class="section-heading" id="annualSectionTitle" style="display:none;">연간 지표</h2>
  <div class="charts-grid" id="chartsGrid" style="display:none;"></div>

  <div class="reports-section" id="reportsSection">
    <h2>증권사 리포트 <span class="report-count" id="reportCount"></span></h2>
    <div class="report-note">제목을 누르면 네이버 금융 리서치의 공개 PDF 원문이 열립니다. 아래 작은 링크는 본문 페이지입니다.</div>
    <div class="reports-table-wrap">
      <div class="reports-loading" id="reportsLoading">리포트를 불러오는 중...</div>
      <table class="reports-table" id="reportsTable" style="display:none;">
        <thead>
          <tr>
            <th>날짜</th>
            <th>증권사</th>
            <th>제목 / 요약</th>
            <th>투자의견</th>
            <th>목표가</th>
          </tr>
        </thead>
        <tbody id="reportsBody"></tbody>
      </table>
      <button class="reports-more" id="reportsMore" style="display:none;" onclick="showMoreReports()">더 보기</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-content">
    <div class="loading-text" id="loadingText">데이터를 분석하고 있습니다...</div>
    <div class="loading-detail" id="loadingDetail"></div>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-steps" id="progressSteps"></div>
    <button class="cancel-btn" id="cancelBtn" onclick="cancelAnalysis()">분석 취소</button>
  </div>
</div>

<script src="./static/app.js" defer></script>
</body>
</html>
