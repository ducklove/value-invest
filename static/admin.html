<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Value Invest Admin</title>
<!-- 파비콘은 허브 본체(index.html)와 동일 자산(/favicon.svg) 재사용 -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<!-- CSS 로드 순서 = index.html 과 동일(캐스케이드 계약) — 순서 변경 금지 -->
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/dashboard.css">
<link rel="stylesheet" href="/css/analysis.css">
<link rel="stylesheet" href="/css/portfolio.css">
<link rel="stylesheet" href="/css/mobile-overrides.css">
<link rel="stylesheet" href="/css/admin-wiki.css">
<link rel="stylesheet" href="/css/mobile-shell.css">
<link rel="stylesheet" href="/css/labs.css">
<style>
  :root {
    --bg: #f6f8fb;
    --surface: #ffffff;
    --card-bg: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-faint: #94a3b8;
    --border: #dbe3ee;
    --border-strong: #c8d3e1;
    --hover-bg: #f1f5f9;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --accent-blue: #2563eb;
    --color-success: #059669;
    --color-warning: #d97706;
    --color-danger: #dc2626;
    --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.07);
  }
  [data-theme="dark"] {
    --bg: #0b1120;
    --surface: #111827;
    --card-bg: #111827;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-faint: #64748b;
    --border: #243244;
    --border-strong: #334155;
    --hover-bg: #182235;
    --primary: #60a5fa;
    --primary-hover: #93c5fd;
    --accent-blue: #60a5fa;
    --color-success: #34d399;
    --color-warning: #f59e0b;
    --color-danger: #f87171;
    --shadow-soft: 0 18px 50px rgba(0, 0, 0, 0.32);
  }
  * { box-sizing: border-box; }
  body {
    display: block;
    margin: 0;
    min-height: 100vh;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
  }
  .theme-toggle {
    position: static;
    width: 36px;
    height: 36px;
    display: inline-grid;
    place-items: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-primary);
    cursor: pointer;
    font-size: 15px;
    box-shadow: none;
  }
  .admin-shell { width: min(1440px, calc(100% - 36px)); margin: 0 auto; padding: 22px 0 56px; }
  .admin-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
  }
  .admin-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .admin-brand-mark {
    width: 38px; height: 38px; border-radius: 8px;
    display: grid; place-items: center;
    background: var(--text-primary);
    color: var(--surface);
    font-weight: 800;
    letter-spacing: 0;
  }
  .admin-brand h1 { margin: 0; font-size: 23px; line-height: 1.2; letter-spacing: 0; }
  .admin-brand p { margin: 3px 0 0; color: var(--text-secondary); font-size: 13px; }
  .admin-actions { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .admin-title { margin: 0; }
  .admin-hero {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
    gap: 14px;
    align-items: stretch;
    margin-bottom: 14px;
  }
  .admin-status-panel,
  .admin-section,
  .admin-chart-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-soft);
  }
  .admin-section { min-width: 0; margin-bottom: 14px; padding: 16px; overflow: hidden; }
  .admin-section h3 {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin: 0 0 12px;
    font-size: 14px;
    line-height: 1.35;
    color: var(--text-primary);
  }
  .admin-status-panel { padding: 16px; }
  .admin-panel-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
  .admin-panel-title { margin:0; font-size:14px; line-height:1.3; }
  .admin-panel-sub { margin-top:3px; color:var(--text-secondary); font-size:12px; }
  .admin-kpi-grid { display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:10px; }
  .admin-kpi {
    min-width: 0;
    min-height: 88px;
    padding: 13px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: color-mix(in srgb, var(--surface) 94%, var(--bg));
  }
  .admin-kpi-label,
  .admin-card-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 6px;
  }
  .admin-kpi-value,
  .admin-card-value {
    color: var(--text-primary);
    font-size: 18px;
    line-height: 1.15;
    font-weight: 760;
    font-variant-numeric: tabular-nums;
  }
  .admin-kpi-note { margin-top:6px; color:var(--text-secondary); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .admin-chart-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:14px; margin-bottom:14px; }
  .admin-chart-panel { min-width:0; padding:14px; }
  .admin-chart-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .admin-chart-title { margin:0; font-size:14px; line-height:1.3; }
  .admin-chart-sub { margin-top:3px; color:var(--text-secondary); font-size:12px; }
  .admin-chart { width:100%; height:218px; overflow:hidden; }
  .admin-chart svg { display:block; width:100%; height:100%; }
  .admin-chart-empty { display:grid; place-items:center; height:100%; color:var(--text-secondary); font-size:12px; border:1px dashed var(--border); border-radius:8px; }
  .admin-grid-two { display:grid; grid-template-columns:minmax(0, 1fr) minmax(0, 1fr); gap:14px; align-items:start; }
  .admin-grid-two > * { min-width: 0; }
  .admin-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(172px, 1fr)); gap:10px; }
  .admin-card {
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 14px;
    background: color-mix(in srgb, var(--surface) 94%, var(--bg));
  }
  .admin-sub { color: var(--text-secondary); font-size: 12px; font-weight: 400; }
  .admin-progress { height: 5px; background: var(--border); border-radius: 999px; margin-top: 9px; overflow: hidden; }
  .admin-progress-fill { height: 100%; border-radius: 999px; transition: width .25s ease; }
  .admin-table-wrap { width:100%; overflow:auto; border:1px solid var(--border); border-radius:8px; }
  .admin-table { width:100%; border-collapse:separate; border-spacing:0; font-size:13px; }
  .admin-table th {
    position: sticky; top: 0; z-index: 1;
    text-align:left;
    padding:9px 12px;
    background: color-mix(in srgb, var(--surface) 90%, var(--bg));
    border-bottom:1px solid var(--border);
    color:var(--text-secondary);
    font-size:11px;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .admin-table td {
    padding:10px 12px;
    border-bottom:1px solid var(--border);
    color:var(--text-primary);
    vertical-align:middle;
  }
  .admin-table tr:last-child td { border-bottom:0; }
  .admin-table-compact td { padding:7px 10px; }
  .admin-num { text-align:right; font-variant-numeric:tabular-nums; }
  .admin-status-ok { color: var(--color-success); font-weight:700; }
  .admin-status-fail { color: var(--color-danger); font-weight:700; }
  .admin-status-run { color: var(--color-warning); font-weight:700; }
  .admin-btn,
  .admin-link-button {
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 11px;
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    background: var(--surface);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease, color .15s ease;
  }
  .admin-btn:hover,
  .admin-link-button:hover { background:var(--hover-bg); border-color:var(--primary); color:var(--primary); }
  .admin-btn:disabled { opacity:.5; cursor:not-allowed; }
  .admin-btn-primary { background:var(--primary); color:#fff; border-color:var(--primary); }
  .admin-btn-primary:hover { background:var(--primary-hover); color:#fff; }
  .admin-btn-secondary { color:var(--text-secondary); }
  .admin-btn-danger { color:var(--color-danger); border-color:color-mix(in srgb, var(--color-danger) 30%, var(--border)); }
  .admin-field,
  .admin-search-input,
  .admin-select {
    min-height: 34px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    color: var(--text-primary);
    padding: 0 10px;
    font: inherit;
    font-size: 13px;
    outline: none;
  }
  .admin-field:focus,
  .admin-search-input:focus,
  .admin-select:focus { border-color:var(--primary); box-shadow:0 0 0 3px color-mix(in srgb, var(--primary) 16%, transparent); }
  .admin-user-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
  .admin-toolbar-left,
  .admin-toolbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .admin-user-cell { display:flex; align-items:center; gap:10px; min-width:220px; }
  .admin-avatar {
    width:32px; height:32px; border-radius:8px; object-fit:cover;
    background:var(--hover-bg); border:1px solid var(--border);
  }
  .admin-avatar-fallback {
    width:32px; height:32px; border-radius:8px; display:grid; place-items:center;
    background: color-mix(in srgb, var(--primary) 12%, var(--surface));
    color:var(--primary); font-weight:800;
  }
  .admin-user-main { min-width:0; }
  .admin-user-main strong { display:block; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .admin-user-main span { display:block; color:var(--text-secondary); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .admin-badge {
    display:inline-flex; align-items:center; min-height:22px; padding:0 8px;
    border-radius:6px; border:1px solid var(--border);
    background:var(--hover-bg); color:var(--text-secondary); font-size:11px; font-weight:800;
  }
  .admin-badge-internal { border-color:color-mix(in srgb, var(--primary) 30%, var(--border)); color:var(--primary); background:color-mix(in srgb, var(--primary) 10%, var(--surface)); }
  .admin-event-kv { display:inline-flex; align-items:center; min-height:22px; padding:0 7px; margin:0 4px 4px 0; font-size:11px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; background:var(--hover-bg); border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); }
  .admin-event-details { max-width:520px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .admin-diag-verdict { padding:12px 14px; border:1px solid color-mix(in srgb, var(--color-success) 32%, var(--border)); background:color-mix(in srgb, var(--color-success) 8%, var(--surface)); border-radius:8px; }
  .admin-anomaly-chips { margin-top:7px; display:flex; flex-wrap:wrap; gap:4px; }
  .admin-muted-row { color:var(--text-secondary); text-align:center; padding:22px !important; }
  .admin-collapsible { padding: 0; }
  .admin-collapsible-summary {
    min-height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    list-style: none;
  }
  .admin-collapsible-summary::-webkit-details-marker { display: none; }
  .admin-collapsible-title {
    display: block;
    margin-bottom: 3px;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 800;
    line-height: 1.3;
  }
  .admin-collapsible-meta { display:inline-flex; align-items:center; gap:8px; flex-shrink:0; }
  .admin-collapsible-icon {
    width: 24px;
    height: 24px;
    display: inline-grid;
    place-items: center;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-secondary);
    background: var(--surface);
  }
  .admin-collapsible-icon::before { content: '+'; font-weight: 800; line-height: 1; }
  .admin-collapsible[open] .admin-collapsible-icon::before { content: '-'; }
  .admin-collapsible[open] .admin-collapsible-summary { border-bottom: 1px solid var(--border); }
  .admin-collapsible-body { padding: 14px 16px 16px; }
  /* 관리형 다이얼로그(adminConfirm/adminPromptDate — admin.js). display 는
     openManagedModal 이 flex 로 켠다. */
  .admin-dialog-overlay {
    position: fixed;
    inset: 0;
    z-index: 9500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(15, 23, 42, 0.45);
  }
  .admin-dialog {
    width: min(420px, 100%);
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-primary);
    box-shadow: var(--shadow-soft);
  }
  .admin-dialog-message { font-size: 14px; line-height: 1.55; white-space: pre-line; }
  .admin-dialog-input-row { margin-top: 12px; }
  .admin-dialog-input-row .admin-field { width: 100%; }
  .admin-dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  @media (max-width: 1180px) {
    .admin-hero,
    .admin-chart-grid,
    .admin-grid-two { grid-template-columns: 1fr; }
    .admin-kpi-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 720px) {
    .admin-shell { width: calc(100% - 20px); padding-top: 14px; }
    .admin-topbar { align-items:flex-start; flex-direction:column; }
    .admin-kpi-grid { grid-template-columns: 1fr 1fr; }
    .admin-section { padding: 13px; }
    .admin-section h3 { display:block; }
    .admin-section > .admin-table {
      display: block;
      max-width: 100%;
      overflow-x: auto;
      white-space: nowrap;
    }
    .admin-chart { height: 190px; }
    /* 모바일 카드 변환(M14): 행당 카드 레이아웃. 렌더러(admin-observability.js)가
       td 에 data-label 을 넣은 표(.admin-table-cards — 배치 작업·사용자·HTTP 성능)만
       thead 를 숨기고 tr 을 2열 grid 카드로 재배치한다. CSS content 는 DOM 텍스트가
       아니므로 정렬·버튼·기존 테스트 동작 불변.
       카드화가 어색한 넓은 표(이벤트 피드 상세 프리뷰, AI 사용량 7열 수치 매트릭스,
       2열뿐인 DB 통계 등)는 기존 가로 스크롤(.admin-table-wrap)을 유지한다. */
    .admin-table.admin-table-cards { display: block; white-space: normal; }
    .admin-table.admin-table-cards thead { display: none; }
    .admin-table.admin-table-cards tbody { display: block; }
    .admin-table.admin-table-cards tr {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px 12px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .admin-table.admin-table-cards tr:last-child { border-bottom: 0; }
    .admin-table.admin-table-cards td {
      display: block;
      min-width: 0;
      padding: 0;
      border-bottom: 0;
      text-align: left;
    }
    .admin-table.admin-table-cards td[data-label]::before {
      content: attr(data-label);
      display: block;
      margin-bottom: 3px;
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .admin-table.admin-table-cards td.admin-cell-full,
    .admin-table.admin-table-cards td[colspan] { grid-column: 1 / -1; }
    .admin-table.admin-table-cards td[colspan] { text-align: center; }
    /* 모바일 터치 타겟: 시각 크기(32/36px)는 유지하고 투명 의사요소로
       히트 영역만 40px 이상으로 확장한다 (버튼 gap 8px과 상쇄되어 겹침 없음). */
    .admin-btn,
    .admin-link-button,
    .theme-toggle { position: relative; }
    .admin-btn::after,
    .admin-link-button::after,
    .theme-toggle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: max(100%, 40px);
      height: max(100%, 40px);
      transform: translate(-50%, -50%);
    }
  }
</style>
</head>
<body>
<div id="adminContent"><div style="color:var(--text-secondary);text-align:center;padding:40px;">로딩 중...</div></div>

<!-- 공용 헬퍼는 utils.js 단일 소스를 쓴다: apiFetch/apiFetchJson(타임아웃·
     credentials:'include'·admin 뮤테이션 JSON 헤더 포함), reportApiError,
     showToast, escapeHtml. APP_CONFIG 가 없는 이 페이지에서 buildApiUrl 은
     same-origin 상대 경로로 동작한다. 과거 인라인 apiFetch 사본은 utils.js 와
     드리프트(timeoutMs 미지원, reportApiError 부재 → ReferenceError)를 낳아
     제거했다.
     의존 순서: utils.js → admin.js(공용 _esc, 부트스트랩) → 패널 모듈. -->
<script src="/js/utils.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/admin-charts.js"></script>
<script src="/js/admin-observability.js"></script>
<script src="/js/admin-linked-projects.js"></script>
<script>
_adminLoaded = false;
loadAdminView();
</script>
</body>
</html>
