<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Value Invest Admin</title>
<link rel="stylesheet" href="/styles.css">
<style>
  body { margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text-primary); }
  :root { --bg: #f9fafb; --text-primary: #111827; --text-secondary: #6b7280; --card-bg: #fff; --border: #e5e7eb; --surface: #fff; --hover-bg: #f3f4f6; --color-success: #27ae60; --color-warning: #f39c12; --color-danger: #e74c3c; }
  [data-theme="dark"] { --bg: #111827; --text-primary: #f9fafb; --text-secondary: #9ca3af; --card-bg: #1f2937; --border: #374151; --surface: #1f2937; --hover-bg: #374151; }
  .theme-toggle { position: fixed; top: 12px; right: 16px; background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 16px; }
  /* Observability — subsystem tiles + event feed + diag form */
  .admin-event-kv { display: inline-block; padding: 2px 6px; margin-right: 4px; font-size: 11px; font-family: monospace; background: var(--hover-bg); border-radius: 3px; color: var(--text-secondary); }
  .admin-event-details { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .admin-diag-verdict { padding: 12px; border-left: 3px solid var(--color-success); background: var(--hover-bg); border-radius: 4px; }
  .admin-anomaly-chips { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')">&#x1f313;</button>
<div id="adminContent"><div style="color:var(--text-secondary);text-align:center;padding:40px;">로딩 중...</div></div>

<script>
async function apiFetch(url, opts) { return fetch(url, opts); }
</script>
<script src="/js/admin.js"></script>
<script>
_adminLoaded = false;
loadAdminView();
</script>
</body>
</html>
